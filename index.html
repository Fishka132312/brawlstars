<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Wiki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.jpg">
</head>
<body>
    <header>
        <nav>
            <button onclick="showSection('maps')">Maps</button>
            <button onclick="showSection('draft')">Draft</button>
            <button onclick="showSection('classes')">Brawler Classes</button>
            <button onclick="showSection('meta')">Meta</button>
            <button onclick="showSection('counterpick')">Peak Selection</button>
        </nav>
    </header>

    <main id="app">
        <section id="draft-section" class="hidden" style="color: white; padding: 20px 40px; font-family: 'Lilita One', cursive; width: 100%; box-sizing: border-box; align-items: stretch !important;">
    
    <h1 style="text-align: center; font-size: 2.8rem; color: #ffcb05; text-shadow: 3px 3px 0 #000; margin: 0 0 30px 0; width: 100%;">PRO DRAFT ANALYZER</h1>

    <div class="draft-main-layout" style="display: flex; gap: 20px; width: 100%; justify-content: space-between; align-items: flex-start;">
        
       <div class="draft-left-side" style="flex: 0 0 300px; background: rgba(15, 15, 25, 0.9); padding: 20px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px;">
    <div id="draft-map-display">
        <div style="width: 100%; height: 200px; border: 3px dashed #444; border-radius: 15px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; box-sizing: border-box;">
            CHOOSE MAP TO START
        </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
        <label style="font-size: 0.9rem; color: #aaa; margin-left: 5px;">MAP SELECT</label>
        <div style="position: relative; width: 100%;">
    <input 
    type="text" 
    id="draft-map-select" 
    list="map-list" 
    placeholder="-- SELECT OR TYPE MAP --" 
    onfocus="this.value=''" 
    onchange="handleMapInput(this)"
    style="width: 100%; padding: 12px; border-radius: 10px; background: #222; color: white; border: 2px solid #ffcc00; font-family: 'Lilita One'; cursor: pointer; box-sizing: border-box; outline: none;"
>
    <datalist id="map-list">
        </datalist>
</div>

        <label style="font-size: 0.9rem; color: #aaa; margin-left: 5px;">ORDER</label>
        <button id="side-toggle" onclick="toggleFirstSide()" style="width: 100%; padding: 12px; border-radius: 10px; background: #007bff; color: white; border: none; font-family: 'Lilita One'; cursor: pointer; text-transform: uppercase;">
            BLUE SIDE FIRST
        </button>

        <div id="ban-mode-container" onclick="toggleBanMode()" style="
    width: 100%; 
    height: 48px; 
    background: #1a1a1a; 
    border-radius: 14px; 
    border: 2px solid #444; 
    position: relative; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    padding: 4px; 
    box-sizing: border-box; 
    font-family: 'Lilita One', cursive;
    transition: all 0.3s ease;
    user-select: none;
">
    <div id="mode-slider" style="
        position: absolute; 
        left: 4px; 
        width: calc(50% - 4px); 
        height: calc(100% - 8px); 
        background: #007bff; 
        border-radius: 10px; 
        transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        z-index: 1;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    "></div>

    <div style="flex: 1; text-align: center; z-index: 2; color: white; font-size: 1rem; letter-spacing: 1px;">PICK</div>
    <div style="flex: 1; text-align: center; z-index: 2; color: white; font-size: 1rem; letter-spacing: 1px;">BAN</div>
</div>
        <button onclick="resetDraft()" 
    onmouseover="this.style.transform='scale(1.05)'; this.style.background='#ff5252';" 
    onmouseout="this.style.transform='scale(1)'; this.style.background='#f44336';"
    onmousedown="this.style.transform='scale(0.95) translateY(2px)'; this.style.boxShadow='0 2px 0 #b32d16';" 
    onmouseup="this.style.transform='scale(1.05) translateY(0)'; this.style.boxShadow='0 4px 0 #b32d16';"
    style="
        width: 100%; 
        padding: 10px; 
        border-radius: 10px; 
        background: #f44336; 
        color: white; 
        border: none; 
        font-family: 'Lilita One'; 
        cursor: pointer; 
        margin-top: 10px; 
        box-shadow: 0 4px 0 #b32d16; 
        transition: transform 0.15s ease-out, background 0.2s ease, box-shadow 0.1s ease;
        outline: none;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    ">
    RESET DRAFT
</button>
        <button onclick="undoLastAction()" 
    onmouseover="this.style.transform='scale(1.05)';" 
    onmouseout="this.style.transform='scale(1)';"
    onmousedown="this.style.transform='scale(0.95) translateY(2px)'; this.style.boxShadow='0 2px 0 #e68a00';" 
    onmouseup="this.style.transform='scale(1.05) translateY(0)'; this.style.boxShadow='0 4px 0 #e68a00';"
    style="
        width: 100%; 
        padding: 10px; 
        border-radius: 10px; 
        background: #ff9800; 
        color: white; 
        border: none; 
        font-family: 'Lilita One'; 
        cursor: pointer; 
        margin-top: 10px; 
        box-shadow: 0 4px 0 #e68a00; 
        transition: transform 0.15s ease-out, box-shadow 0.1s ease;
        outline: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    ">
    ↩️ UNDO LAST PICK
</button>
    </div>
</div>

<div class="draft-center-side" style="flex: 0 0 180px; background: rgba(15, 15, 25, 0.9); padding: 15px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; gap: 10px;">
    
    <div style="width: 100%;">
        <h3 style="color: #4facfe; text-align: center; font-size: 0.8rem; margin-bottom: 5px;">BLUE TEAM</h3>
        <div id="blue-slots" style="display: flex; flex-direction: column; gap: 5px; align-items: center;">
            <div class="draft-slot" id="d-slot-blue-1" style="width: 60px; height: 60px; background: rgba(79, 172, 254, 0.05); border-radius: 10px; border: 2px dashed #4facfe; display: flex; align-items: center; justify-content: center;"></div>
            <div class="draft-slot" id="d-slot-blue-2" style="width: 60px; height: 60px; background: rgba(79, 172, 254, 0.05); border-radius: 10px; border: 2px dashed #4facfe; display: flex; align-items: center; justify-content: center;"></div>
            <div class="draft-slot" id="d-slot-blue-3" style="width: 60px; height: 60px; background: rgba(79, 172, 254, 0.05); border-radius: 10px; border: 2px dashed #4facfe; display: flex; align-items: center; justify-content: center;"></div>
        </div>
    </div>

    <div style="width: 100%; border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 10px 0; margin: 5px 0;">
        <div style="text-align: center; font-size: 0.7rem; color: #ff4b2b; margin-bottom: 5px;">BANNED</div>
        <div id="ban-slots" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; justify-items: center;">
            <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid #333;"></div>
            <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid #333;"></div>
            <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid #333;"></div>
            <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid #333;"></div>
            <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid #333;"></div>
            <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 5px; border: 1px solid #333;"></div>
        </div>
    </div>

    <div style="font-size: 1.2rem; color: rgba(255,255,255,0.1); font-family: 'Lilita One';">VS</div>

    <div style="width: 100%;">
        <div id="red-slots" style="display: flex; flex-direction: column; gap: 5px; align-items: center;">
            <div class="draft-slot" id="d-slot-red-1" style="width: 60px; height: 60px; background: rgba(255, 75, 43, 0.05); border-radius: 10px; border: 2px dashed #ff4b2b; display: flex; align-items: center; justify-content: center;"></div>
            <div class="draft-slot" id="d-slot-red-2" style="width: 60px; height: 60px; background: rgba(255, 75, 43, 0.05); border-radius: 10px; border: 2px dashed #ff4b2b; display: flex; align-items: center; justify-content: center;"></div>
            <div class="draft-slot" id="d-slot-red-3" style="width: 60px; height: 60px; background: rgba(255, 75, 43, 0.05); border-radius: 10px; border: 2px dashed #ff4b2b; display: flex; align-items: center; justify-content: center;"></div>
        </div>
        <h3 style="color: #ff4b2b; text-align: center; font-size: 0.8rem; margin-top: 5px;">RED TEAM</h3>
    </div>

</div>

        <div class="draft-right-side" style="flex: 1.2; background: rgba(255, 204, 0, 0.05); padding: 25px; border-radius: 25px; border: 2px solid #ffcc00; box-shadow: inset 0 0 20px rgba(255, 204, 0, 0.05);">
    
    <div style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
        <h3 style="color: #ffcc00; text-align: center; margin: 0; font-size: 1.6rem; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">TOP 10 ANALYTICS</h3>
        
        <button id="shuffle-btn" onclick="shuffleSuggestions()" 
    onmouseover="this.style.transform='scale(1.05)'; this.style.background='rgba(255, 204, 0, 0.2)';" 
    onmouseout="this.style.transform='scale(1)'; this.style.background='rgba(255, 204, 0, 0.1)';"
    onmousedown="this.style.transform='scale(0.95)';" 
    onmouseup="this.style.transform='scale(1.05)';"
    style="
        position: absolute; 
        right: 0; 
        background: rgba(255, 204, 0, 0.1); 
        border: 1px solid rgba(255, 204, 0, 0.4); 
        color: #ffcc00; 
        border-radius: 12px; 
        padding: 5px 12px; 
        cursor: pointer; 
        font-family: 'Lilita One'; 
        font-size: 11px; 
        transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        display: flex; 
        align-items: center; 
        gap: 6px; 
        text-transform: uppercase;
        outline: none;
        z-index: 10;
    ">
    <span style="font-size: 14px;">🔀</span> SHUFFLE
</button>
    </div>

    <div id="strategy-bar" style="display: flex; justify-content: space-between; align-items: center; background: rgba(15, 15, 25, 0.8); padding: 12px 18px; border-radius: 18px; border: 1px solid rgba(255, 204, 0, 0.3); margin-bottom: 20px; backdrop-filter: blur(5px);">
        
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <span style="color: #ffcc00; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Map Priority Bans:</span>
            <div id="ban-icons-list" style="display: flex; gap: 8px; min-height: 38px; align-items: center;">
            </div>
        </div>

        <div style="width: 1px; height: 40px; background: rgba(255,255,255,0.1); margin: 0 15px;"></div>

        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 6px;">
            <span style="color: #00ff88; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;">Power Counter:</span>
            <div id="best-counter-icon" style="min-height: 38px; display: flex; align-items: center;">
                </div>
        </div>
    </div>

    <div id="draft-suggestions" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 5px;">
        </div>
</div>
    </div>

    <div class="all-brawlers-section" style="margin-top: 30px; background: rgba(15, 15, 25, 0.9); padding: 30px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
            <h2 style="margin: 0; font-size: 1.8rem; color: white;">ALL BRAWLERS CATALOG</h2>
            <div style="position: relative;">
                <input type="text" id="draft-search" placeholder="SEARCH FOR A BRAWLER..." oninput="filterDraftBrawlers()" 
                    style="padding: 15px 25px; width: 400px; border-radius: 30px; border: 2px solid #444; background: #111; color: white; font-family: 'Lilita One'; outline: none; transition: 0.3s;">
            </div>
        </div>
        
        <div id="all-brawlers-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 500px; overflow-y: auto; padding: 20px; box-sizing: border-box;">
</div>
            </div>
    </div>

</section>
        <section id="maps-section">
            <h2>Maps and Modes</h2>
            <input type="text" id="mapSearch" placeholder="Map Search..." oninput="searchMaps()">
            <div id="maps-list" class="grid-container">
                </div>
        </section>

        <section id="classes-section" class="hidden">
            <h2>Brawlers Classes</h2>
            <div id="brawlers-by-class">
                </div>
        </section>

        <section id="details-section" class="hidden">
            <button onclick="showSection('classes')" class="back-btn">← Back</button>
            <div id="brawler-details"></div>
        </section>
        <section id="meta-section" class="hidden"></section>

        <section id="counterpick-section" class="hidden" style="color: white; text-align: center; padding: 20px;">
    <h1>Analizing</h1>
    <p>Choose up to 3 enemy:</p>
    
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;">
        <div class="slot" id="slot-1" onclick="openPicker(1)" style="width: 100px; height: 100px; border: 3px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: #1a1a1a;">+</div>
        <div class="slot" id="slot-2" onclick="openPicker(2)" style="width: 100px; height: 100px; border: 3px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: #1a1a1a;">+</div>
        <div class="slot" id="slot-3" onclick="openPicker(3)" style="width: 100px; height: 100px; border: 3px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; background: #1a1a1a;">+</div>
    </div>

    <div class="counterpick-actions" style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
    
    <button onclick="calculateBestPick()" 
            class="action-btn" 
            style="background: #FFCC00; color: #000;">
        FIND A COUNTER-PICK
    </button>

    <button onclick="resetSlots()" 
            class="action-btn reset-btn" 
            style="background: #f44336; color: white;">
        RESET
    </button>
    
</div>

    <div id="pick-result" style="margin-top: 40px;"></div>

    <div id="picker-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box;">
        <button onclick="closePicker()" style="position: sticky; top: 10px; float: right; padding: 10px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer;">CLOSE</button>
        <div id="picker-grid" class="grid-container"></div>
    </div>
</section>
    </main>

    <script src="script.js"></script>
    <script>
    document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
});
</script>
</body>
</html>
